name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# Required for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; don't cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas geopandas folium branca requests shapely numpy

      - name: Generate map
        run: python3 nyc_trees_analysis.py

      - name: Stage site files
        run: |
          mkdir _site
          cp index.html nyc_trees_map.html _site/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
